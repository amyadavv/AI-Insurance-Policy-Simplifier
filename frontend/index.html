<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIPolicySimplifier — AI-Powered Insurance Policy Summaries</title>
    <meta name="description" content="Simplify complex legal and technical language in your insurance policies into plain, easy-to-understand summaries with AI." />
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('theme');
          if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
